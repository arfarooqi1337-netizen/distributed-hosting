<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Unavailable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0e17; color:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.container { text-align:center; max-width:500px; padding:2rem; }
.icon { font-size:4rem; margin-bottom:1rem; }
h1 { font-size:1.5rem; margin-bottom:0.5rem; color:#00e5ff; }
p { color:#94a3b8; font-size:0.9rem; line-height:1.6; }
.tag { display:inline-block; margin-top:1rem; padding:0.25rem 0.75rem; background:rgba(239,68,68,0.15); color:#ef4444; border-radius:9999px; font-size:0.75rem; }
</style>
</head>
<body>
<div class="container">
<div class="icon">🛠️</div>
<h1>Site Temporarily Unavailable</h1>
<p>This website is hosted on a distributed network. All hosting nodes are currently offline. The site will be restored automatically when a node becomes available.</p>
<div class="tag">Distributed Hosting — VPS Fallback</div>
</div>
</body>
</html>
